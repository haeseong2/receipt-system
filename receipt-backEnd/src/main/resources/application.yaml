spring:
  application:
    name: receipt-app
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
#   url: jdbc:mysql://localhost:3306/receipt_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Tokyo  개발
    url: jdbc:mysql://mysql:3306/receipt_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Tokyo
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  management:
    endpoints:
      web:
        exposure:
          include: prometheus